  <text x="120" y="368" fill="#303940" font-family="'Manrope', 'Avenir Next', sans-serif" font-size="34" font-weight="500">
    Engineering, Product &amp; Platform Leader
  </text>
  <text x="120" y="418" fill="#303940" font-family="'Manrope', 'Avenir Next', sans-serif" font-size="34" font-weight="500">
