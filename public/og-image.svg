    </linearGradient>
    <radialGradient id="accent" cx="85%" cy="18%" r="55%">
      <stop offset="0%" stop-color="#4e7f88" stop-opacity=".22" />
      <stop offset="100%" stop-color="#4e7f88" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#accent)" />
  <rect x="60" y="60" width="1080" height="510" rx="34" fill="rgba(255,255,255,0.72)" stroke="rgba(20,24,27,0.12)" />
  <text x="120" y="180" fill="#7a858f" font-family="'IBM Plex Mono', monospace" font-size="24" letter-spacing="6">PRODUCT, PLATFORM &amp; AI EXECUTIVE</text>
